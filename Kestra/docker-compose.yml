volumes:
  postgres-data:
    driver: local
  kestra-data:
    driver: local
  kestra-tmp:
    driver: local

services:
  postgres:
    image: postgres:16
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: kestra
      POSTGRES_USER: kestra
      POSTGRES_PASSWORD: k3str4
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 30s
      timeout: 10s
      retries: 10

  kestra:
    image: kestra/kestra:latest
    pull_policy: always
    user: "root"
    command: server standalone
    volumes:
      - kestra-data:/app/storage
      - kestra-tmp:/tmp/kestra-wd
      - /var/run/docker.sock:/var/run/docker.sock
      - ./set_kv.yaml:/app/flows/london_transport.set_kv.yaml
      - ./data_load_gcs.yaml:/app/flows/london_transport.data_load_gcs.yaml
      - ./gcs_to_bigquery_raw.yaml:/app/flows/london_transport.gcs_to_bigquery_raw.yaml
      - ./build_mart_bigquery.yaml:/app/flows/london_transport.build_mart_bigquery.yaml
      - ./build_dashboard_views_bigquery.yaml:/app/flows/london_transport.build_dashboard_views_bigquery.yaml
      - ./end_to_end_pipeline.yaml:/app/flows/london_transport.end_to_end_pipeline.yaml
    environment:
      SECRET_GCP_SERVICE_ACCOUNT: ${SECRET_GCP_SERVICE_ACCOUNT:-}
      SECRET_GCP_SERVICE_ACCOUNT_B64: ${SECRET_GCP_SERVICE_ACCOUNT_B64:-}
      KESTRA_CONFIGURATION: |
        datasources:
          postgres:
            url: jdbc:postgresql://postgres:5432/kestra
            driverClassName: org.postgresql.Driver
            username: kestra
            password: k3str4
        kestra:
          server:
            basicAuth:
              username: "admin@kestra.io"
              password: Kestra123
          repository:
            type: postgres
          storage:
            type: local
            local:
              basePath: "/app/storage"
          tutorialFlows:
            enabled: false
          queue:
            type: postgres
          tasks:
            tmpDir:
              path: /tmp/kestra-wd/tmp
          url: http://localhost:8080/
    ports:
      - "8080:8080"
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy

  flow-bootstrap:
    image: curlimages/curl:8.14.1
    entrypoint:
      - /bin/sh
      - -ec
      - |
        until curl -sf http://kestra:8081/health >/dev/null; do sleep 2; done
        for flow in /bootstrap/flows/*.yaml; do
          echo "Importing $$flow"
          curl -sf -u "admin@kestra.io:Kestra123" -X POST \
            http://kestra:8080/api/v1/main/flows/import \
            -F "fileUpload=@$${flow}" >/dev/null
        done
        echo "Flow bootstrap completed."
    volumes:
      - ./set_kv.yaml:/bootstrap/flows/london_transport.set_kv.yaml:ro
      - ./data_load_gcs.yaml:/bootstrap/flows/london_transport.data_load_gcs.yaml:ro
      - ./gcs_to_bigquery_raw.yaml:/bootstrap/flows/london_transport.gcs_to_bigquery_raw.yaml:ro
      - ./build_mart_bigquery.yaml:/bootstrap/flows/london_transport.build_mart_bigquery.yaml:ro
      - ./build_dashboard_views_bigquery.yaml:/bootstrap/flows/london_transport.build_dashboard_views_bigquery.yaml:ro
      - ./end_to_end_pipeline.yaml:/bootstrap/flows/london_transport.end_to_end_pipeline.yaml:ro
    depends_on:
      kestra:
        condition: service_started
